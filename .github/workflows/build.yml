name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  logic-tests:
    name: Host unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile and run sunshade logic tests
        run: |
          cc -std=c11 -Wall -Wextra -Werror -I main \
             test/test_sunshade_logic.c -o sunshade_logic_test
          ./sunshade_logic_test

  build:
    name: ESP-IDF ${{ matrix.idf_version }}
    needs: logic-tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        idf_version: [v5.3.2, v5.4.1]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with ESP-IDF ${{ matrix.idf_version }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: esp32
          path: "."

  build-sensors:
    name: ESP-IDF build (all sensors enabled)
    needs: logic-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with wind, rain, light and temp/humidity enabled
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32
          path: "."
          command: SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.ci.sensors" idf.py build
